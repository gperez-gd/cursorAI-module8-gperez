name: Full-Stack CI/CD (Optimized)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

# ─────────────────────────────────────────────────────────────────────
# STAGE 1 — CI  (frontend, backend, security run fully in parallel)
# ─────────────────────────────────────────────────────────────────────
jobs:

  # ── Frontend: install → build → test (3 parallel shards) ──────────
  frontend-ci:
    name: "Frontend CI [shard ${{ matrix.shard }}/${{ strategy.job-total }}]"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    # Fix 6: working-directory remapped from frontend/ to repo root
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Fix 6: cache path and lockfile key corrected to repo-root paths
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Jest shard ${{ matrix.shard }}/3
        run: |
          npm test -- \
            --watchAll=false \
            --coverage \
            --shard=${{ matrix.shard }}/${{ strategy.job-total }} \
            --maxWorkers=2
        env:
          CI: true

      - name: Upload coverage (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-shard-${{ matrix.shard }}
          path: coverage/
          retention-days: 7

      # Fix 6: build output is dist/ (Vite), not build/
      - name: Upload build artifact
        if: matrix.shard == 1
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist/
          retention-days: 1

  # ── Backend: install → test (pytest-xdist parallel workers) ────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    # Fix 6: working-directory remapped from backend/ to repo root
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Fix 6: venv cache path corrected to repo-root
      - name: Cache Python virtualenv
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install backend dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest pytest-cov pytest-xdist

      - name: Run Flask tests (parallel workers)
        run: |
          .venv/bin/pytest \
            -n auto \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short
        env:
          FLASK_ENV: testing

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7

  # ── Security scanning (runs in parallel with CI jobs) ──────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Fix 6: cache path and lockfile corrected to repo-root
      - name: Cache node_modules (security job)
        id: npm-cache-sec
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Install deps (cache miss)
        if: steps.npm-cache-sec.outputs.cache-hit != 'true'
        run: npm ci

      # Fix 9: continue-on-error removed — gate is now blocking
      - name: npm audit (high & critical only)
        run: npm audit --audit-level=high

      # Fix 9: continue-on-error removed — Snyk gates are now blocking
      - name: Snyk – scan frontend dependencies
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Fix 6: --file path corrected to repo-root package.json
          args: --severity-threshold=high --file=package.json

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Fix 9: continue-on-error removed — Snyk Python gate is now blocking
      - name: Snyk – scan backend dependencies
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Fix 6: --file path corrected to repo-root requirements.txt
          args: --severity-threshold=high --file=requirements.txt

# ─────────────────────────────────────────────────────────────────────
# STAGE 2 — Docker build (with layer caching via GitHub Actions cache)
# ─────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]

    permissions:
      contents: read
      packages: write

    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      backend-image: ${{ steps.meta-backend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download React build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          # Fix 6: artifact was built into dist/ not build/
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Extract backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

# ─────────────────────────────────────────────────────────────────────
# STAGE 3 — Blue-Green Deploy (only on main, after Docker build + security)
# ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy – Blue/Green Production
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Fix 8 ── Step 1: Determine active slot ────────────────────────
      # Queries /health for a `slot` field; defaults to "blue" if absent.
      - name: Determine active slot
        id: slot
        run: |
          CURRENT=$(curl -sf --connect-timeout 5 --max-time 10 \
            "${{ vars.DEPLOY_URL }}/health" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('slot','blue'))" \
            2>/dev/null || echo "blue")
          NEW=$( [[ "$CURRENT" == "blue" ]] && echo "green" || echo "blue" )
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "Active slot: $CURRENT → deploying to: $NEW"

      # Fix 8 ── Step 2: Deploy to the inactive slot ──────────────────
      # Uncomment the block that matches your deployment provider.
      - name: Deploy to ${{ steps.slot.outputs.new }} slot
        run: |
          NEW_SLOT="${{ steps.slot.outputs.new }}"
          FRONTEND_TAG="${{ needs.docker-build.outputs.frontend-image }}"
          BACKEND_TAG="${{ needs.docker-build.outputs.backend-image }}"

          echo "Deploying frontend=$FRONTEND_TAG  backend=$BACKEND_TAG  slot=$NEW_SLOT"

          # ── AWS ECS ────────────────────────────────────────────────
          # aws ecs update-service \
          #   --cluster prod-${NEW_SLOT} --service app \
          #   --force-new-deployment --region ${{ vars.AWS_REGION }}

          # ── Fly.io ────────────────────────────────────────────────
          # fly deploy --app app-${NEW_SLOT} \
          #   --image $BACKEND_TAG --remote-only

          # ── Kubernetes ────────────────────────────────────────────
          # kubectl set image deployment/app-${NEW_SLOT} \
          #   app=$BACKEND_TAG --namespace production

          # ── Render ────────────────────────────────────────────────
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PREFIX }}-${NEW_SLOT}"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      # Fix 8 ── Step 3: Health-check the new slot (3-minute window) ──
      - name: Health-check ${{ steps.slot.outputs.new }} slot
        run: |
          DEPLOY_URL="${{ vars.DEPLOY_URL }}"
          MAX_RETRIES=18    # 18 × 10 s = 3 min
          RETRY_INTERVAL=10

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 10 \
              "${DEPLOY_URL}/health" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (attempt $i) — HTTP $HTTP_STATUS"
              exit 0
            fi

            echo "Attempt $i/$MAX_RETRIES — HTTP $HTTP_STATUS, retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          echo "Health check FAILED after $MAX_RETRIES attempts."
          exit 1

      # Fix 8 ── Step 4: Promote new slot → live ──────────────────────
      # Flip the load balancer / DNS weighted record / feature flag.
      - name: Promote ${{ steps.slot.outputs.new }} → live
        run: |
          NEW_SLOT="${{ steps.slot.outputs.new }}"
          echo "Switching traffic to $NEW_SLOT slot."

          # ── AWS ALB target-group swap ──────────────────────────────
          # aws elbv2 modify-listener \
          #   --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
          #   --default-actions Type=forward,TargetGroupArn=${{ secrets[format('TG_ARN_{0}', upper(steps.slot.outputs.new))] }}

          # ── Fly.io: update primary app alias ──────────────────────
          # fly scale set --app app-primary --image-ref ${{ needs.docker-build.outputs.backend-image }}

          # ── Kubernetes: update the stable VirtualService weight ────
          # kubectl patch virtualservice app-vs --type=json \
          #   -p "[{\"op\":\"replace\",\"path\":\"/spec/http/0/route/0/destination/host\",\"value\":\"app-${NEW_SLOT}\"}]"

          echo "Traffic now routed to: $NEW_SLOT"

      # Fix 8 ── Step 5: Mark old slot as standby ─────────────────────
      - name: Mark ${{ steps.slot.outputs.current }} as standby
        if: success()
        run: |
          echo "Slot '${{ steps.slot.outputs.current }}' is now standby — ready for instant rollback."

      # Fix 8 ── Rollback guard: traffic unchanged on failure ─────────
      - name: Rollback – keep ${{ steps.slot.outputs.current }} live
        if: failure()
        run: |
          echo "Deploy to '${{ steps.slot.outputs.new }}' failed."
          echo "Traffic remains on '${{ steps.slot.outputs.current }}' — no customer impact."
          exit 1

# ─────────────────────────────────────────────────────────────────────
# STAGE 4 — Slack notification on any pipeline failure
# ─────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Slack – Notify Failure
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, security-scan, docker-build, deploy]
    if: failure()

    steps:
      - name: Send Slack failure alert
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "#FF0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": ":red_circle: CI/CD Pipeline Failed"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Repository:*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch:*\n`${{ github.ref_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by:*\n${{ github.actor }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>"
                        }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View Failed Run" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                          "style": "danger"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
